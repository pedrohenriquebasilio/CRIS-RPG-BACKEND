name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            mkdir -p /opt/apps/${{ github.event.repository.name }}
            cd /opt/apps/${{ github.event.repository.name }}

            if [ ! -d ".git" ]; then
              git clone https://${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git .
            else
              git fetch origin main
              git reset --hard origin/main
              git clean -fd
            fi

            cat > .env << 'EOF'
            POSTGRES_USER=postgres
            POSTGRES_PASSWORD=postgres
            POSTGRES_DB=system_rpg
            JWT_SECRET=feiticeiros-e-maldicoes-secret-key-2026
            JWT_EXPIRES_IN=7d
            FRONTEND_URL=https://cris-rpg-system.vercel.app
            EOF

            docker compose up -d --build postgres backend
            docker image prune -f
