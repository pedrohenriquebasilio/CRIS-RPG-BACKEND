name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  APP_PATH: /opt/apps/${{ github.event.repository.name }}

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Backend: lint + build
  # ──────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Frontend: build
  # ──────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-secret
          NEXT_PUBLIC_API_URL: http://localhost:3001
        run: npm run build

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Deploy  (push to main only, after CI passes)
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            mkdir -p /opt/apps/${{ github.event.repository.name }}
            cd /opt/apps/${{ github.event.repository.name }}

            if [ ! -d ".git" ]; then
              git clone https://${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git .
            else
              git fetch origin main
              git reset --hard origin/main
              git clean -fd
            fi

            # Escreve o .env com os secrets do GitHub
            cat > .env << 'EOF'
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRES_IN=7d
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            EOF

            docker compose down || true
            docker compose up -d --build
            docker image prune -f
