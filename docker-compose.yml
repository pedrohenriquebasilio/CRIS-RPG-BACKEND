version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rpg_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: system_rpg
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rpg_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/system_rpg?schema=public
      JWT_SECRET: feiticeiros-e-maldicoes-secret-key-2026
      JWT_EXPIRES_IN: 7d
      PORT: 3001
      FRONTEND_URL: https://dailydev.com.br
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rpg-backend.rule=Host(`api.dailydev.com.br`)"
      - "traefik.http.routers.rpg-backend.entrypoints=web,websecure"
      - "traefik.http.routers.rpg-backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.rpg-backend.loadbalancer.server.port=3001"
    networks:
      - web
      - backend

volumes:
  postgres_data:

networks:
  web:
    external: true
  backend:
    internal: true
